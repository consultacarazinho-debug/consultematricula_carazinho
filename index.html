<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Consulta de Matrícula</title>
</head>

<body>

<h2>Consultar Localização pela Matrícula</h2>

<input type="text" id="matricula" placeholder="Digite a matrícula">
<button onclick="consultar()">Consultar</button>

<p id="resultado"></p>

<script>

async function consultar(){

let matriculaDigitada = document.getElementById("matricula").value.trim()

let resposta = await fetch("seu_arquivo.csv")
let texto = await resposta.text()

let linhas = texto.split("\n")

for(let i=1;i<linhas.length;i++){

let colunas = linhas[i].split(",")

let matricula = colunas[0]
let lat = colunas[1]
let long = colunas[2]

if(matricula == matriculaDigitada){

let linkMapa = "https://www.google.com/maps?q=" + lat + "," + long

document.getElementById("resultado").innerHTML =
"Local encontrado:<br>" +
"Latitude: " + lat + "<br>" +
"Longitude: " + long + "<br><br>" +
"<a href='"+linkMapa+"' target='_blank'>Abrir no mapa</a>"

return
}

}

document.getElementById("resultado").innerHTML = "Matrícula não encontrada"

}

</script>

</body>
</html>
