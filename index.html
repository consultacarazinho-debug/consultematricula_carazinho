<script>
async function consultar() {

  const matriculaDigitada = document.getElementById("matricula").value.trim();

  if (!matriculaDigitada) {
    document.getElementById("resultado").innerHTML = "Digite uma matrícula!";
    return;
  }

  try {

    const resposta = await fetch("seu_arquivo.csv");
    const texto = await resposta.text();
    const linhas = texto.split("\n");

    for (let i = 1; i < linhas.length; i++) {

      const linha = linhas[i].trim();
      if (!linha) continue;

      let colunas = linha.split(";");
      if (colunas.length < 3) colunas = linha.split(",");

      const matricula = colunas[0]?.trim();
      const latitude = colunas[1]?.trim();
      const longitude = colunas[2]?.trim();

      if (!matricula || !latitude || !longitude) continue;

      if (matricula === matriculaDigitada) {

        const linkMapa = `https://www.google.com/maps?q=${latitude},${longitude}`;

        document.getElementById("resultado").innerHTML =
        `Local encontrado:<br>
        Latitude: ${latitude}<br>
        Longitude: ${longitude}<br><br>
        <a href="${linkMapa}" target="_blank">Abrir no mapa</a>`;

        return;
      }

    }

    document.getElementById("resultado").innerHTML = "Matrícula não encontrada";

  } catch (erro) {
    document.getElementById("resultado").innerHTML = "Erro ao carregar o CSV";
  }
}
</script>
