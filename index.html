<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Consulta de Matrícula</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
#mapa{
height:400px;
width:600px;
}
</style>

</head>

<body>

<h2>Consultar Localização pela Matrícula</h2>

<input type="text" id="matricula" placeholder="Digite a matrícula">
<button onclick="consultar()">Consultar</button>

<h3>Resultado:</h3>
<p id="resultado"></p>

<h3>Mapa:</h3>
<div id="mapa"></div>

<script>

let mapa
let marcadorUsuario
let marcadorMatricula

const iconeUsuario = L.icon({
iconUrl:'https://maps.google.com/mapfiles/ms/icons/blue-dot.png',
iconSize:[32,32],
iconAnchor:[16,32]
})

const iconeMatricula = L.icon({
iconUrl:'https://maps.google.com/mapfiles/ms/icons/red-dot.png',
iconSize:[32,32],
iconAnchor:[16,32]
})

function distancia(lat1, lon1, lat2, lon2){

const R = 6371

const dLat = (lat2-lat1) * Math.PI/180
const dLon = (lon2-lon1) * Math.PI/180

const a =
Math.sin(dLat/2)*Math.sin(dLat/2) +
Math.cos(lat1*Math.PI/180) *
Math.cos(lat2*Math.PI/180) *
Math.sin(dLon/2)*Math.sin(dLon/2)

const c = 2 * Math.atan2(Math.sqrt(a),Math.sqrt(1-a))

return R*c

}

function pegarLocalizacao(){

return new Promise((resolve,reject)=>{

navigator.geolocation.getCurrentPosition(

(pos)=>{
resolve({
latitude:pos.coords.latitude,
longitude:pos.coords.longitude
})
},

()=>reject()

)

})

}

async function consultar(){

const matriculaDigitada =
document.getElementById("matricula").value.trim()

if(!matriculaDigitada){
alert("Digite uma matrícula")
return
}

let minhaLat=null
let minhaLon=null

try{

const minhaPos = await pegarLocalizacao()

minhaLat = minhaPos.latitude
minhaLon = minhaPos.longitude

}catch(e){}

const resposta = await fetch("seu_arquivo.csv")
const texto = await resposta.text()

const linhas = texto.split("\n")

let latEncontrada=null
let lonEncontrada=null

let todasMatriculas=[]

for(let i=1;i<linhas.length;i++){

const colunas = linhas[i].split(";")

const matricula = colunas[0]?.trim()
const lat = parseFloat(colunas[1])
const lon = parseFloat(colunas[2])

if(matricula && !isNaN(lat) && !isNaN(lon)){

todasMatriculas.push({
matricula:matricula,
lat:lat,
lon:lon
})

}

if(matricula === matriculaDigitada){

latEncontrada = lat
lonEncontrada = lon

}

}

if(latEncontrada === null){

document.getElementById("resultado").innerHTML="Matrícula não encontrada"
return

}

if(!mapa){

mapa = L.map('mapa').setView([latEncontrada,lonEncontrada],15)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(mapa)

}

if(marcadorMatricula){
mapa.removeLayer(marcadorMatricula)
}

marcadorMatricula =
L.marker([latEncontrada,lonEncontrada],{icon:iconeMatricula})
.addTo(mapa)
.bindPopup("Matrícula pesquisada")
.openPopup()

if(minhaLat){

if(marcadorUsuario){
mapa.removeLayer(marcadorUsuario)
}

marcadorUsuario =
L.marker([minhaLat,minhaLon],{icon:iconeUsuario})
.addTo(mapa)
.bindPopup("Sua localização")

}

mapa.setView([latEncontrada,lonEncontrada],15)

let resultadoHTML = "📍 Matrícula encontrada<br><br>"

if(minhaLat){

const distUsuario = distancia(
minhaLat,
minhaLon,
latEncontrada,
lonEncontrada
)

resultadoHTML += `📏 Distância da sua localização: ${distUsuario.toFixed(2)} km<br><br>`

}

let proximas = []

for(let item of todasMatriculas){

if(item.matricula !== matriculaDigitada){

const d = distancia(
latEncontrada,
lonEncontrada,
item.lat,
item.lon
)

proximas.push({
matricula:item.matricula,
distancia:d
})

}

}

proximas.sort((a,b)=>a.distancia-b.distancia)

resultadoHTML += "<b>3 Matrículas mais próximas:</b><br><br>"

for(let i=0;i<3;i++){

if(proximas[i]){

resultadoHTML +=
`${i+1}️⃣ Matrícula: ${proximas[i].matricula}
 — ${proximas[i].distancia.toFixed(2)} km<br>`

}

}

document.getElementById("resultado").innerHTML = resultadoHTML

}

</script>

</body>
</html>
