<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Consulta de Matrícula</title>
</head>

<body>

<h2>Consulta de Matrícula</h2>

<input type="text" id="matricula" placeholder="Digite a matrícula">
<button onclick="consultar()">Consultar</button>

<p id="resultado"></p>

<script>

async function consultar(){

let matriculaDigitada = document.getElementById("matricula").value

let resposta = await fetch("seu_arquivo.csv")
let texto = await resposta.text()

let linhas = texto.split("\n")

for(let i = 1; i < linhas.length; i++){

let colunas = linhas[i].split(",")

let matricula = colunas[0]
let nome = colunas[1]

if(matricula == matriculaDigitada){

document.getElementById("resultado").innerHTML =
"Nome: " + nome

return
}

}

document.getElementById("resultado").innerHTML =
"Matrícula não encontrada"

}

</script>

</body>
</html>
