<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Consulta de Matrícula</title>
</head>

<body>

<h2>Consultar Localização pela Matrícula</h2>

<input type="text" id="matricula" placeholder="Digite a matrícula">
<button onclick="consultar()">Consultar</button>

<h3>Resultado:</h3>
<p id="resultado"></p>

<h3>Mapa:</h3>
<iframe id="mapa" width="600" height="400" style="border:0;"></iframe>

<script>

// CALCULAR DISTÂNCIA ENTRE DOIS PONTOS
function distancia(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;

  const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
            Math.cos(lat1 * Math.PI / 180) *
            Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLon/2) * Math.sin(dLon/2);

  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}

// PEGAR LOCALIZAÇÃO DO USUÁRIO
function pegarLocalizacao() {
  return new Promise((resolve, reject) => {

    if (!navigator.geolocation) {
      reject("Geolocalização não suportada");
      return;
    }

    navigator.geolocation.getCurrentPosition(
      (pos) => {
        resolve({
          latitude: pos.coords.latitude,
          longitude: pos.coords.longitude
        });
      },
      () => reject("Usuário não permitiu localização")
    );

  });
}

async function consultar() {

  const matriculaDigitada = document.getElementById("matricula").value.trim();

  if (!matriculaDigitada) {
    alert("Digite uma matrícula!");
    return;
  }

  let minhaLat = null;
  let minhaLon = null;

  try {
    const minhaPos = await pegarLocalizacao();
    minhaLat = minhaPos.latitude;
    minhaLon = minhaPos.longitude;
  } catch(e) {
    console.log("Usuário não permitiu localização");
  }

  try {

    const resposta = await fetch("seu_arquivo.csv");
    const texto = await resposta.text();
    const linhas = texto.split("\n");

    let dados = [];
    let latitude = null;
    let longitude = null;

    for (let i = 1; i < linhas.length; i++) {

      const linha = linhas[i].trim();
      if (!linha) continue;

      const colunas = linha.split(";");

      if (colunas.length < 3) continue;

      const matricula = colunas[0].trim();
      const lat = parseFloat(colunas[1]);
      const lon = parseFloat(colunas[2]);

      if (!lat || !lon) continue;

      dados.push({matricula, latitude: lat, longitude: lon});

      if (matricula === matriculaDigitada) {

        latitude = lat;
        longitude = lon;

        // GERAR MAPA
        let mapaURL =
        `https://www.openstreetmap.org/export/embed.html?bbox=${longitude-0.01},${latitude-0.01},${longitude+0.01},${latitude+0.01}&layer=mapnik&marker=${latitude},${longitude}`;

        if (minhaLat && minhaLon) {
          mapaURL += `&marker=${minhaLat},${minhaLon}`;
        }

        document.getElementById("mapa").src = mapaURL;

        // BUSCAR ENDEREÇO
        const geo = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${latitude}&lon=${longitude}&format=json`);
        const geoData = await geo.json();

        document.getElementById("resultado").innerHTML =
        `📍 Matrícula encontrada:<br>
        Latitude: ${latitude}<br>
        Longitude: ${longitude}<br><br>
        🏠 Endereço:<br>
        ${geoData.display_name}<br><br>`;

        // DISTÂNCIA DO USUÁRIO
        if (minhaLat && minhaLon) {

          const distUsuario = distancia(
            minhaLat,
            minhaLon,
            latitude,
            longitude
          );

          document.getElementById("resultado").innerHTML +=
          `📏 Distância da sua localização: ${distUsuario.toFixed(2)} km<br><br>`;
        }

      }
    }

    // CALCULAR 3 MAIS PRÓXIMAS
    let resultados = [];

    for (let item of dados) {

      if (item.matricula === matriculaDigitada) continue;

      const d = distancia(
        latitude,
        longitude,
        item.latitude,
        item.longitude
      );

      if (!isNaN(d)) {
        resultados.push({...item, distancia: d});
      }

    }

    resultados.sort((a,b) => a.distancia - b.distancia);

    let proximos = resultados.slice(0,3);

    if (proximos.length > 0) {

      document.getElementById("resultado").innerHTML +=
      "🔎 3 Matrículas mais próximas:<br>";

      proximos.forEach(p => {
        document.getElementById("resultado").innerHTML +=
        `➡ ${p.matricula} (${p.distancia.toFixed(2)} km)<br>`;
      });

    }

  } catch (erro) {

    document.getElementById("resultado").innerHTML =
    "Erro ao carregar o CSV";

  }

}

</script>

</body>
</html>
